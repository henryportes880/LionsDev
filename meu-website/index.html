<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto do Henry | Lions Dev</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #1e1e1e;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #867ca5;
            text-align: center;
            max-width: 350px;
        }
        h1 { color: #ffffff; margin-bottom: 10px; }
        .btn-jogar {
            background-color: #7362ac4f;
            color: #ffffff;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            margin-top: 20px;
        }
        .btn-jogar:hover {
            background-color: #12063b;
            transform: scale(1.05);
        }
        .badge {
            display: inline-block;
            background: #333;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.8rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Projeto do Henry</h1>
        <p>Estudante focado em <strong>Node.js</strong></p>
        <button class="btn-jogar" onclick="jogar()">Começar Jogo</button>
        <div class="badge">Lions Dev 🦁</div>
        
        <p style="margin-top: 20px;">Construindo o futuro com JavaScript no lado do servidor.</p>
        
        <div class="footer">
            © 2024 - Desenvolvido com por Henry Portes
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
